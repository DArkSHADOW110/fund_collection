<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treasurer Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container login-container">
    <div class="card">
      <h2 style="text-align: center;">Admin Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <div id="error-msg" class="error-msg hidden"></div>
        <button type="submit" style="width: 100%;">Login</button>
      </form>

      <div style="text-align: center; margin-top: 1.25rem;">
        <a href="#" id="toggle-forgot" class="btn-text">Forgot Password?</a>
      </div>

      <form id="forgot-form" class="hidden"
        style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
        <h3 style="margin-bottom: 1rem; text-align: center; font-size: 1.1rem;">Reset Password</h3>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; text-align: center;">Enter your
          username and security pin</p>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="forgot-username" required>
        </div>
        <div class="form-group">
          <label>Security Pin</label>
          <input type="password" id="forgot-pin" required>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="forgot-new-password" required>
        </div>
        <div id="forgot-msg" class="error-msg hidden"></div>
        <button type="submit" style="width: 100%;">Reset Password</button>
      </form>

      <div style="margin-top: 1.5rem;">
        <a href="index.html" class="btn-outline">
          <svg style="width: 18px; height: 18px; margin-right: 0.5rem;" fill="none" stroke="currentColor"
            viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
          </svg>
          Back to Dashboard
        </a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; <span id="year">2026</span> South Eastern University 2022 Batch Fund. All rights reserved.</p>
    <p>Designed & Developed by <a href="https://darkshadow110.github.io/thilankawishka/
      " target="_blank">Thilan Kawishka</a>
    </p>
  </footer>

  <script src="js/login.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>

</html>
